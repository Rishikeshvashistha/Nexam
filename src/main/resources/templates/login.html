<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<link rel="stylesheet"
th:href="@{/css/style.css}">
</head>

<body>

<!-- Optional keep navbar if you want -->
<!-- <div th:replace="~{fragments :: navbar}"></div> -->

<div class="container" id="container">

    <!-- LEFT SIDE LOGIN (connected to Spring Security) -->
    <div class="form-container sign-in">
        <form th:action="@{/login}" method="post" autocomplete="off">

            <h1>Log In</h1>

            <div class="social-icons">
                <a href="#" class="icon">
                    <i class="fa-brands fa-google-plus-g"></i>
                </a>

                <a href="#" class="icon">
                    <i class="fa-brands fa-github"></i>
                </a>

                <a href="#" class="icon">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
            </div>

            <span>Use your credentials to login</span>

            <!-- Thymeleaf error messages preserved -->
            <div th:if="${param.error}" style="color:red; margin-top:10px;">
                Invalid username or password
            </div>

            <div th:if="${param.logout}" style="color:green; margin-top:10px;">
                You have been logged out
            </div>

            <!-- IMPORTANT keep names exactly -->
            <input
             type="text"
             name="username"
             placeholder="Username"
             required
             autocomplete="off">

            <input
             type="password"
             name="password"
             placeholder="Password"
             required
             autocomplete="new-password">

            <a href="#">Forgot Password?</a>

            <button type="submit">
                Log In
            </button>

        </form>
    </div>


    <!-- RIGHT PANEL (instead of fake JS sign-up use real register link) -->
    <div class="toggle-container">
        <div class="toggle">

            <div class="toggle-panel toggle-right">
                <h1>Hello, User!</h1>

                <p>
                    Register to access online exams, track progress,
                    and manage your assessments seamlessly.
                </p>

                <a th:href="@{/register}">
                    <button type="button" class="hidden">
                        Create account
                    </button>
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
