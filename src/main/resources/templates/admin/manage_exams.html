<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Manage Exams</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/nav.css}" />

    <style>
      body {
        background-color: #09090d;
        padding: 5px 14px;
      }

      .container h2 {
        color: #c8ced8;
      }

      .cd {
        background: linear-gradient(180deg, #1c1e25 0%, #14161d 100%);
        border: 1px solid #343944;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35),
          inset 0 1px 1px rgba(255, 255, 255, 0.03);
        color: #c8ced8;
      }

      .cd-body {
        background: linear-gradient(180deg, #1c1e25 0%, #14161d 100%);
        /* border: 1px solid #343944; */
        /* box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35),
          inset 0 1px 1px rgba(255, 255, 255, 0.03); */
        color: #c8ced8;
      }

      .custom-head th {
        background: linear-gradient(180deg, #1c1e25 0%, #14161d 100%);
        color: #e7edf8;
        border-bottom: 0px #1c1e25;
        font-weight: 600;
      }

      tbody tr td[colspan] {
        background: linear-gradient(
          180deg,
          #1c1e25 0%,
          #14161d 100%
        ) !important;
        color: #c8ced8 !important;
        border-bottom: 1px solid #343944 !important;
        font-size: 1.15rem;
        padding: 18px 10px;
      }

      .table > :not(caption) > * > * {
        background: linear-gradient(
          180deg,
          #1c1e25 0%,
          #14161d 100%
        ) !important;
        color: #c8ced8 !important;
        border-bottom: 1px solid #343944 !important;
        font-size: 1.15rem;
        padding: 18px 10px;
      }

      .table-hover tbody tr:hover td {
        background: #313848 !important;
        /* box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05),
          0 6px 18px rgba(0, 0, 0, 0.28) !important; */
      }

      .buton {
        position: relative;
        right: 0;
        display: flex;
        /* margin: 0 auto; */
        /* align-items: center; */
        /* justify-content: center; */
        gap: 10px;
        padding: 12px 27px;
        /* border: none; */
        cursor: pointer;
        font-weight: 500;
        letter-spacing: 0.5px;
        color: #f5f5f5;
        background: linear-gradient(180deg, #313848, #262d3b);
        border: 1px solid #343944;
        border-radius: 30px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        /* padding: 18px 20px; */
        text-decoration: none;
      }

      /* hover shadow */
      .buton:hover {
        background: linear-gradient(180deg, #313848, #262d3b);
        color: #f78f3a !important;
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05),
          0 6px 18px rgba(0, 0, 0, 0.28);
      }

      .buton-riple:active {
        box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.08);
      }

    </style>
  </head>
  <body>
    <div class="nav-wrapper">
      <div th:replace="~{navbar :: navbar}"></div>
    </div>

    <div class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Manage Exams</h2>
        <a th:href="@{/admin/exam/add}" class="buton buton-riple">
          <i class="bi bi-plus-circle-fill me-2"></i>Create New Exam
        </a>
      </div>

      <div class="card shadow-sm cd">
        <div class="card-body cd-body">
          <div class="table-responsive cd-body">
            <table class="table table-hover align-middle mb-0 cd-body">
              <thead class="custom-head">
                <tr>
                  <th scope="col">Exam Title</th>
                  <th scope="col">Duration (Mins)</th>
                  <th scope="col">Questions</th>
                  <th scope="col">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="exam : ${exams}" class="empty-state">
                  <td th:text="${exam.title}">Sample Exam Title</td>
                  <td th:text="${exam.durationInMinutes}">60</td>
                  <td th:text="${#lists.size(exam.questions)}">10</td>
                  <td>
                    <!-- Add Questions Button -->
                    <a
                      th:href="@{/admin/exam/{examId}/question/add(examId=${exam.id})}"
                      class="btn btn-sm btn-success me-2"
                      title="Add Questions"
                    >
                      <i class="bi bi-plus-lg"></i> Add Qs
                    </a>
                    <!-- View Results Button -->
                    <a
                      th:href="@{/admin/results/{examId}(examId=${exam.id})}"
                      class="btn btn-sm btn-info me-2"
                      title="View Results"
                    >
                      <i class="bi bi-bar-chart-fill"></i> Results
                    </a>

                    <!-- Manage Questions Button -->
                    <a
                      th:href="@{/admin/exam/manage-questions/{examId}(examId=${exam.id})}"
                      class="btn btn-sm btn-secondary me-2"
                      title="Manage Questions"
                    >
                      <i class="bi bi-list-task"></i> Manage Qs
                    </a>

                    <!-- Edit Exam Button -->
                    <a
                      th:href="@{/admin/exam/edit/{examId}(examId=${exam.id})}"
                      class="btn btn-sm btn-warning me-2"
                      title="Edit Exam"
                    >
                      <i class="bi bi-pencil-fill"></i> Edit
                    </a>

                    <!-- Delete Exam Button -->
                    <a
                      th:href="@{/admin/exam/delete/{examId}(examId=${exam.id})}"
                      class="btn btn-sm btn-danger"
                      title="Delete Exam"
                      onclick="return confirm('Are you sure you want to delete this exam? This will delete all associated questions and results.');"
                    >
                      <i class="bi bi-trash-fill"></i> Delete
                    </a>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(exams)}">
                  <td colspan="4" class="text-center fst-italic">
                    No exams found. Click "Create New Exam" to get started.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
