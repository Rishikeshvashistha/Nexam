<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Add Admin</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />

    <style>
      body {
        /* background: linear-gradient(to right, #e2e2e2, #c9d6ff); */
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background: radial-gradient(
          circle at bottom right,
          #c66a2f 0%,
          #1e1e23 55%,
          #09090d 100%
        );
      }

      .form-input {
        /* width: 100%; */
        padding: 8px 20px;
        background: linear-gradient(180deg, #313848, #262d3b);
        color: #ffffff !important;
        -webkit-text-fill-color: white; /* fixes chrome/safari */
        border: 1px solid #343944;
        border-radius: 999px;
        outline: none;
        font-size: 24px;
        font-weight: 500;
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05),
          0 6px 18px rgba(0, 0, 0, 0.28);
      }

      .admin-card {
        color: #fff;
        width: 500px;
        /* background: white; */
        padding: 40px;
        /* border-radius: 25px; */
        /* box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); */

        background: linear-gradient(180deg, #1c1e25 0%, #14161d 100%);
        border: 1px solid #343944;
        border-radius: 28px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55),
          inset 0 1px 1px rgba(255, 255, 255, 0.05);
      }

      .login-btn {
        position: relative;
        display: flex;
        margin: 0 auto;
        align-items: center;
        justify-content: center;
        gap: 15px;
        padding: 12px 45px;
        /* border: none; */
        cursor: pointer;
        /* border-radius: 9999px; */
        /* background: linear-gradient(to right, #dbdbdd, #b9babd); */
        /* color: #4b5563; */
        font-weight: 500;
        letter-spacing: 0.5px;
        /* box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12); */
        /* transition: all 0.5s ease-out; */
        /* overflow: hidden; */

        color: #f5f5f5;
        background: linear-gradient(180deg, #313848, #262d3b);
        border: 1px solid #343944;
        border-radius: 30px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        /* padding: 18px 20px; */
      }

      /* hover shadow */
      .login-btn:hover {
        transform: none;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }

      .ripple-btn:active {
        box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.08);
      }

      /* text above glow */
      .login-btn span {
        width: 100%;
        white-space: nowrap;
        position: relative;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div class="admin-card">
      <h2 class="text-center mb-4">Create New Admin</h2>

      <div th:if="${param.error}" class="alert alert-danger">
        Username already exists!
      </div>

      <div th:if="${param.success}" class="alert alert-success">
        Admin created successfully!
      </div>

      <form th:action="@{/admin/add-admin}" method="post">
        <div class="mb-3">
          <label class="form-label"> Full Name </label>

          <input
            type="text"
            name="fullName"
            class="form-control form-input"
            autocomplete="off"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label"> Username </label>

          <input
            type="text"
            name="username"
            class="form-control form-input"
            autocomplete="off"
            required
          />
        </div>

        <div class="mb-4">
          <label class="form-label"> Password </label>

          <input
            type="password"
            name="password"
            class="form-control form-input"
            autocomplete="new-password"
            required
          />
        </div>

        <button class="login-btn ripple-btn">
          <span>Add Admin</span>
        </button>
      </form>

      <div class="text-center mt-3">
        <a th:href="@{/admin/dashboard}"> Back to Dashboard </a>
      </div>
    </div>
  </body>
</html>
